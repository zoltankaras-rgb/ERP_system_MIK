<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Dashboard - Expedícia</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* TVRDÝ ZÁKAZ ROLOVANIA */
    body, html {
        margin: 0; padding: 0; height: 100vh; overflow: hidden;
        background-color: #f4f6f9; 
        font-family: 'Inter', sans-serif;
        color: #333;
    }
    .tv-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
    }
    
    /* Hlavička s logom, dátumom a časom */
    .tv-header {
        flex: 0 0 auto;
        display: flex; justify-content: space-between; align-items: center;
        background-color: #ffffff;
        padding: 15px 40px; /* Zväčšené odsadenie od okrajov */
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-bottom: 6px solid #d32f2f;
    }
    .logo-box img { height: 80px; } /* Mierne zväčšené logo */
    .title-box { text-align: center; }
    .title-box h1 { margin: 0; font-size: 2.6rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }
    .title-box .target-date { font-size: 1.8rem; color: #d32f2f; font-weight: 700; margin-top: 5px; }
    .time-box { font-size: 3.5rem; font-weight: 800; color: #2c3e50; font-variant-numeric: tabular-nums; min-width: 180px; text-align: right; }
    
    /* GLOBÁLNY OZNAM OD VEDÚCEJ */
    #global-note-container {
        flex: 0 0 auto;
        background-color: #ffc107; /* Žltá výstražná farba */
        color: #000;
        font-size: 2.6rem;
        font-weight: 800;
        text-align: center;
        padding: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        display: none; /* Skryté v základe */
        z-index: 10;
        border-bottom: 2px solid #e0a800;
    }

    /* Hlavný priestor pre karty - odstránené centrovanie, pridaná plná šírka */
    .tv-content {
        flex: 1 1 auto;
        padding: 40px; /* Výrazné medzery od rámov TV */
        box-sizing: border-box;
        width: 100%;
        display: block; /* Oprava: odstránený flex center, aby grid mohol dýchať */
        overflow: hidden; /* Nikdy sa to nebude scrollovať */
    }
    
    /* Mriežka pre karty objednávok - flexibilne roztiahnuté na celú šírku TV */
    #obsah-tabule {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(550px, 1fr)); /* Obrovské karty pre TV */
        gap: 30px; /* Väčšie medzery medzi kartami */
        align-content: start;
        transform-origin: top center; 
        transition: transform 0.3s ease; 
    }

    /* Úhľadná karta - OVEĽA VÄČŠIA a výstrednejšia */
    .karta {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        border-left: 12px solid #d32f2f; /* Hrubší pruh */
        padding: 30px; /* Dvojnásobné vnútorné odsadenie */
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .zakaznik-hlavicka {
        display: flex; justify-content: space-between; align-items: baseline;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 15px;
    }
    .zakaznik-nazov { font-size: 2.3rem; font-weight: 800; color: #2c3e50; } /* Písmo prečítateľné z 10 metrov */
    .objednavka-info { font-size: 1.5rem; color: #7f8c8d; font-weight: 600; }

    /* Poznámky - zväčšené */
    .poznamka-riadok { display: flex; align-items: flex-start; gap: 15px; font-size: 1.7rem; font-weight: 600; padding: 18px; border-radius: 10px; }
    .stala-poznamka { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .dnesna-poznamka { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
    .ikona { font-size: 2rem; }

  </style>
</head>
<body>
  <div class="tv-container">
      <div class="tv-header">
          <div class="logo-box">
              <img src="/static/mik logo.jpg" alt="MIK Logo"> 
          </div>
          <div class="title-box">
              <h1>Špeciálne požiadavky</h1>
              <div class="target-date" id="cielovy-datum">Chystáme na: Načítavam...</div>
          </div>
          <div class="time-box" id="aktualny-cas">00:00:00</div>
      </div>

      <div id="global-note-container"></div>

      <div class="tv-content">
          <div id="obsah-tabule">
              <div style="grid-column: 1 / -1; text-align: center; font-size: 2.8rem; color: #7f8c8d; margin-top: 15vh;">Načítavam systém...</div>
          </div>
      </div>
  </div>

  <script src="/static/js/expedition_board.js"></script>
</body>
</html>
