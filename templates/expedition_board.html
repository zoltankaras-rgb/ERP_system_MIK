<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Dashboard - Expedícia</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    body, html {
        margin: 0; padding: 0; height: 100vh; overflow: hidden;
        background-color: #f4f6f9; 
        font-family: 'Inter', sans-serif;
        color: #333;
    }
    .tv-container {
        display: flex; flex-direction: column; height: 100vh; width: 100vw;
    }
    
    /* Hlavička */
    .tv-header {
        flex: 0 0 auto;
        display: flex; justify-content: space-between; align-items: center;
        background-color: #ffffff;
        padding: 10px 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-bottom: 4px solid #d32f2f;
    }
    .logo-box img { height: 50px; }
    .title-box { text-align: center; }
    .title-box h1 { margin: 0; font-size: 2rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }
    .title-box .target-date { font-size: 1.4rem; color: #d32f2f; font-weight: 700; margin-top: 2px; }
    .time-box { font-size: 2.5rem; font-weight: 800; color: #2c3e50; font-variant-numeric: tabular-nums; min-width: 150px; text-align: right; }
    
    /* GLOBÁLNY OZNAM */
    #global-note-container {
        flex: 0 0 auto;
        background-color: #ffc107; 
        color: #000;
        font-size: 1.8rem; 
        font-weight: 800;
        text-align: center;
        padding: 12px 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        display: none;
        z-index: 10;
        border-bottom: 2px solid #e0a800;
        word-wrap: break-word;
    }

    /* Hlavný priestor */
    .tv-content {
        flex: 1 1 auto;
        padding: 30px;
        box-sizing: border-box;
        width: 100%;
        overflow: hidden; 
    }
    
    /* MRIEŽKA: Základná veľkosť písma je riadená premennou z JS */
    #obsah-tabule {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(22em, 1fr)); 
        gap: 1.5em;
        align-content: start;
        transform-origin: top left;
        transition: transform 0.2s ease;
        
        /* TOTO MENÍ JS PODĽA MNOŽSTVA OBJEDNÁVOK */
        font-size: var(--board-font-size, 18px); 
    }

    /* KARTA V RELATÍVNYCH JEDNOTKÁCH (em) */
    .karta {
        background: #ffffff;
        border-radius: 0.8em;
        box-shadow: 0 0.4em 1em rgba(0,0,0,0.06);
        border-left: 0.6em solid #d32f2f;
        padding: 1.2em 1.5em;
        display: flex;
        flex-direction: column;
        gap: 1em;
        height: auto; 
    }
    
    /* OPRAVA: Položky idú pod seba, aby číslo nevytrčalo von */
    .zakaznik-hlavicka {
        display: flex; 
        flex-direction: column; 
        align-items: flex-start;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 0.8em;
        gap: 0.5em; 
    }
    
    .zakaznik-nazov { 
        font-size: 1.4em; 
        font-weight: 800; 
        color: #2c3e50;
        word-wrap: break-word;
        line-height: 1.1; 
        margin: 0;
    }
    
    .objednavka-info { 
        font-size: 1em; 
        color: #7f8c8d; 
        font-weight: 700;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.8em;
    }

    /* Poznámky */
    .poznamka-riadok { 
        display: flex; 
        align-items: flex-start; 
        gap: 0.8em; 
        font-size: 1.1em; 
        font-weight: 700; 
        padding: 1em; 
        border-radius: 0.5em; 
        line-height: 1.3; 
        word-wrap: break-word;
    }
    
    .stala-poznamka { background-color: #fff3cd; color: #856404; border: 2px solid #ffeeba; }
    .dnesna-poznamka { background-color: #e2e3e5; color: #383d41; border: 2px solid #d6d8db; }
    .ikona { font-size: 1.3em; margin-top: 0.1em; flex-shrink: 0; }

    /* Indikátor pre Dátum */
    .datum-tag {
        color: #d32f2f; 
        background: #ffebee; 
        padding: 0.3em 0.6em; 
        border-radius: 0.3em;
    }
  </style>
</head>
<body>
  <div class="tv-container">
      <div class="tv-header">
          <div class="logo-box">
              <img src="/static/mik logo.jpg" alt="MIK Logo"> 
          </div>
          <div class="title-box">
              <h1>Špeciálne požiadavky</h1>
              <div class="target-date" id="cielovy-datum">Chystáme na: Načítavam...</div>
          </div>
          <div class="time-box" id="aktualny-cas">00:00:00</div>
      </div>

      <div id="global-note-container"></div>

      <div class="tv-content">
          <div id="obsah-tabule">
              <div style="grid-column: 1 / -1; text-align: center; font-size: 2em; color: #7f8c8d; margin-top: 15vh;">Načítavam systém...</div>
          </div>
      </div>
  </div>

  <script src="/static/js/expedition_board.js"></script>
</body>
</html>
