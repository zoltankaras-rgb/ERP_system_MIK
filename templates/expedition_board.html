<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Dashboard - Expedícia</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* TVRDÝ ZÁKAZ ROLOVANIA */
    body, html {
        margin: 0; padding: 0; height: 100vh; overflow: hidden;
        background-color: #f4f6f9; 
        font-family: 'Inter', sans-serif;
        color: #333;
    }
    .tv-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
    }
    
    /* Hlavička */
    .tv-header {
        flex: 0 0 auto;
        display: flex; justify-content: space-between; align-items: center;
        background-color: #ffffff;
        padding: 20px 40px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-bottom: 6px solid #d32f2f;
    }
    .logo-box img { height: 80px; }
    .title-box { text-align: center; }
    .title-box h1 { margin: 0; font-size: 2.8rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }
    .title-box .target-date { font-size: 2rem; color: #d32f2f; font-weight: 700; margin-top: 5px; }
    .time-box { font-size: 3.8rem; font-weight: 800; color: #2c3e50; font-variant-numeric: tabular-nums; min-width: 200px; text-align: right; }
    
    /* GLOBÁLNY OZNAM OD VEDÚCEJ */
    #global-note-container {
        flex: 0 0 auto;
        background-color: #ffc107; 
        color: #000;
        font-size: 2.8rem;
        font-weight: 800;
        text-align: center;
        padding: 25px;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        display: none;
        z-index: 10;
        border-bottom: 2px solid #e0a800;
    }

    /* Hlavný priestor - Roztiahnutý na full */
    .tv-content {
        flex: 1 1 auto;
        padding: 40px; /* Odstupy od plastových okrajov TV */
        box-sizing: border-box;
        width: 100%;
        overflow: hidden; 
    }
    
    /* Mriežka */
    #obsah-tabule {
        width: 100%;
        display: grid;
        /* KĽÚČOVÁ ZMENA: Min 30% znamená, že karty budú vždy roztiahnuté a max 3 vedľa seba */
        grid-template-columns: repeat(auto-fit, minmax(30%, 1fr));
        gap: 35px;
        align-content: start;
        transform-origin: top left; /* Pri zmenšovaní sa zarovná k ľavému okraju, nie do stredu */
    }

    /* Úhľadná karta - OBRIA PRE TV */
    .karta {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border-left: 15px solid #d32f2f;
        padding: 35px;
        display: flex;
        flex-direction: column;
        gap: 25px;
    }
    .zakaznik-hlavicka {
        display: flex; justify-content: space-between; align-items: baseline;
        border-bottom: 3px solid #f0f0f0;
        padding-bottom: 20px;
    }
    .zakaznik-nazov { font-size: 2.8rem; font-weight: 800; color: #2c3e50; } 
    .objednavka-info { font-size: 1.8rem; color: #7f8c8d; font-weight: 700; }

    /* Poznámky */
    .poznamka-riadok { display: flex; align-items: flex-start; gap: 20px; font-size: 2.2rem; font-weight: 700; padding: 25px; border-radius: 12px; line-height: 1.4; }
    .stala-poznamka { background-color: #fff3cd; color: #856404; border: 2px solid #ffeeba; }
    .dnesna-poznamka { background-color: #e2e3e5; color: #383d41; border: 2px solid #d6d8db; }
    .ikona { font-size: 2.5rem; }

  </style>
</head>
<body>
  <div class="tv-container">
      <div class="tv-header">
          <div class="logo-box">
              <img src="/static/mik logo.jpg" alt="MIK Logo"> 
          </div>
          <div class="title-box">
              <h1>Špeciálne požiadavky</h1>
              <div class="target-date" id="cielovy-datum">Chystáme na: Načítavam...</div>
          </div>
          <div class="time-box" id="aktualny-cas">00:00:00</div>
      </div>

      <div id="global-note-container"></div>

      <div class="tv-content">
          <div id="obsah-tabule">
              <div style="grid-column: 1 / -1; text-align: center; font-size: 3rem; color: #7f8c8d; margin-top: 15vh;">Načítavam systém...</div>
          </div>
      </div>
  </div>

  <script src="/static/js/expedition_board.js"></script>
</body>
</html>
