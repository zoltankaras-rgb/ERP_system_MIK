<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Dashboard - Expedícia</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* TVRDÝ ZÁKAZ ROLOVANIA NA OBRAZOVKE */
    body, html {
        margin: 0; padding: 0; height: 100vh; overflow: hidden;
        background-color: #f4f6f9; 
        font-family: 'Inter', sans-serif;
        color: #333;
    }
    .tv-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
    }
    
    /* Kompaktná hlavička */
    .tv-header {
        flex: 0 0 auto;
        display: flex; justify-content: space-between; align-items: center;
        background-color: #ffffff;
        padding: 10px 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-bottom: 4px solid #d32f2f;
    }
    .logo-box img { height: 50px; }
    .title-box { text-align: center; }
    .title-box h1 { margin: 0; font-size: 2rem; color: #2c3e50; font-weight: 800; text-transform: uppercase; }
    .title-box .target-date { font-size: 1.4rem; color: #d32f2f; font-weight: 700; margin-top: 2px; }
    .time-box { font-size: 2.5rem; font-weight: 800; color: #2c3e50; font-variant-numeric: tabular-nums; min-width: 150px; text-align: right; }
    
    /* GLOBÁLNY OZNAM */
    #global-note-container {
        flex: 0 0 auto;
        background-color: #ffc107; 
        color: #000;
        font-size: 1.8rem; 
        font-weight: 800;
        text-align: center;
        padding: 12px 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        display: none;
        z-index: 10;
        border-bottom: 2px solid #e0a800;
        
        /* FIX PRE DLHÉ OZNAMY: Zalamovanie textu */
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.2;
    }

    /* Hlavný priestor */
    .tv-content {
        flex: 1 1 auto;
        padding: 25px 35px;
        box-sizing: border-box;
        width: 100%;
        overflow: hidden; 
    }
    
    /* Mriežka - dôležité pre TV zobrazenie */
    #obsah-tabule {
        width: 100%;
        display: grid;
        /* Mierne zväčšená minimálna šírka na 450px pre viac miesta */
        grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
        gap: 25px;
        align-content: start;
        transform-origin: top left;
        transition: transform 0.2s ease;
    }

    /* Úhľadná karta s automatickou výškou */
    .karta {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        border-left: 10px solid #d32f2f;
        padding: 20px 25px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        
        /* FIX: Karta sa natiahne podľa obsahu, výška nie je fixná */
        height: auto; 
    }
    
    .zakaznik-hlavicka {
        display: flex; justify-content: space-between; align-items: baseline;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 12px;
        gap: 10px; /* Medzera medzi menom a ID */
    }
    
    .zakaznik-nazov { 
        font-size: 1.9rem; 
        font-weight: 800; 
        color: #2c3e50;
        
        /* FIX: Tvrdé vynútenie zalamovania pre dlhé mená */
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.1; /* Tesnejší riadok pre veľké písmo */
        margin: 0;
    }
    
    .objednavka-info { 
        font-size: 1.3rem; 
        color: #7f8c8d; 
        font-weight: 700;
        white-space: nowrap; /* ID a dátum chceme na jednom riadku */
        text-align: right;
    }

    /* Poznámky - flexibilné a čitateľné */
    .poznamka-riadok { 
        display: flex; 
        align-items: flex-start; 
        gap: 15px; 
        font-size: 1.5rem; 
        font-weight: 700; 
        padding: 15px; 
        border-radius: 8px; 
        
        /* FIX: Relatívna výška riadku, text nikdy nevytečie */
        line-height: 1.3; 
        
        /* FIX: Zalamovanie textu v poznámke */
        word-wrap: break-word;
        overflow-wrap: break-word;
    }
    
    .stala-poznamka { background-color: #fff3cd; color: #856404; border: 2px solid #ffeeba; }
    .dnesna-poznamka { background-color: #e2e3e5; color: #383d41; border: 2px solid #d6d8db; }
    .ikona { font-size: 1.8rem; margin-top: 2px; flex-shrink: 0; } /* Ikona sa nezmenší */

  </style>
</head>
<body>
  <div class="tv-container">
      <div class="tv-header">
          <div class="logo-box">
              <img src="/static/mik logo.jpg" alt="MIK Logo"> 
          </div>
          <div class="title-box">
              <h1>Špeciálne požiadavky</h1>
              <div class="target-date" id="cielovy-datum">Chystáme na: Načítavam...</div>
          </div>
          <div class="time-box" id="aktualny-cas">00:00:00</div>
      </div>

      <div id="global-note-container"></div>

      <div class="tv-content">
          <div id="obsah-tabule">
              <div style="grid-column: 1 / -1; text-align: center; font-size: 2.5rem; color: #7f8c8d; margin-top: 15vh;">Načítavam systém...</div>
          </div>
      </div>
  </div>

  <script src="/static/js/expedition_board.js"></script>
</body>
</html>
